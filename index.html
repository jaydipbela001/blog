<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>SmartReads – Modern Blog Platform | Discover & Share Ideas</title>
    <meta name="description" content="SmartReads is a modern blog platform where you can discover insightful articles, share your ideas, and connect with a community of curious readers and writers." />
    <meta name="keywords" content="blog, articles, writing, reading, SmartReads, modern blog, ideas, stories" />
    <meta name="author" content="SmartReads" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://smartreadsblog.vercel.app" />

    <!-- Open Graph (Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SmartReads" />
    <meta property="og:title" content="SmartReads – Modern Blog Platform" />
    <meta property="og:description" content="Discover insightful articles, share your ideas, and connect with a community of curious readers and writers." />
    <meta property="og:image" content="https://smartreadsblog.vercel.app/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://smartreadsblog.vercel.app" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@smartreads" />
    <meta name="twitter:title" content="SmartReads – Modern Blog Platform" />
    <meta name="twitter:description" content="Discover insightful articles, share your ideas, and connect with a community of curious readers and writers." />
    <meta name="twitter:image" content="https://smartreadsblog.vercel.app/og-image.jpg" />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Schema.org Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "SmartReads",
      "url": "https://smartreadsblog.vercel.app",
      "description": "A modern blog platform to discover and share ideas.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://smartreadsblog.vercel.app/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
